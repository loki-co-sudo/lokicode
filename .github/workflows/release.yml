name: release

# v* タグ（例: v0.3.0）を push するとビルド・署名して GitHub Release を公開する。
# 成果物にはインストーラ・.sig・latest.json が含まれ、インストール版が自己更新できる。
on:
  push:
    tags:
      - "v*"

# Release を作成・更新するために書き込み権限が必要。
permissions:
  contents: write

jobs:
  release:
    # 修正2: Windows / macOS（Apple Silicon・Intel）/ Linux の4ビルドを同じタグの
    # 1つの Release にアップロード（tauri-action が latest.json に各プラット
    # フォームのエントリをまとめる）。macOS は Apple Developer 証明書がないため
    # 未署名配布（README「対応 OS」参照）。
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # macos-latest はピン留め: macOS-15→26 移行中で exit 134 (SIGABRT) のビルド
          # クラッシュを確認したため macos-15 に固定
          # （https://github.com/actions/runner-images/issues/14167 の公式推奨）。
          - platform: macos-15 # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-15 # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 更新成果物（.sig / latest.json）への署名鍵。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          # タグ名（v0.3.0 など）をそのまま Release タグに使う。
          tagName: ${{ github.ref_name }}
          releaseName: "lokicode ${{ github.ref_name }}"
          releaseBody: "詳細は CHANGELOG / コミット履歴を参照してください。"
          releaseDraft: false
          prerelease: false
          # latest.json を生成させる（updater 用）。
          includeUpdaterJson: true
