name: CI

# Build/test gate for every push to master and every PR. Nothing else guards the
# build, so this is the safety net: TypeScript type-check + frontend tests, and
# Rust clippy (warnings = errors) + Rust tests.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run

  rust:
    # Cross-platform gate (修正2): Windows is the primary dev target, but the app
    # ships on macOS/Linux too (release.yml builds all three), so clippy/tests
    # must pass on each before a release build is trusted.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # tauri::generate_context! embeds ../dist at compile time, so the frontend
      # must be built before the Rust crate will compile.
      - name: Build frontend (produces dist/)
        run: |
          npm ci
          npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
