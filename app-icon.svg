<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#2a1c44"/>
      <stop offset="0.55" stop-color="#171029"/>
      <stop offset="1" stop-color="#0b0814"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.52" r="0.62">
      <stop offset="0" stop-color="#39e25a" stop-opacity="0.5"/>
      <stop offset="0.45" stop-color="#2a8f6a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2a8f6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="venom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9ff8a"/>
      <stop offset="0.5" stop-color="#5df06f"/>
      <stop offset="1" stop-color="#16c64a"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7df0a0"/>
      <stop offset="0.5" stop-color="#2bbf63"/>
      <stop offset="1" stop-color="#155f3a"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brighter rounded-square base with a green ambient glow -->
  <rect x="48" y="48" width="928" height="928" rx="224" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="224" fill="url(#glow)"/>
  <rect x="50" y="50" width="924" height="924" rx="222" fill="none" stroke="#5b4a82" stroke-opacity="0.8" stroke-width="4"/>

  <!-- Bold trickster horns, brighter and larger -->
  <g filter="url(#soft)">
    <path d="M474 392 C 398 300 320 232 224 196 C 272 300 338 392 452 452 Z" fill="url(#horn)"/>
    <path d="M550 392 C 626 300 704 232 800 196 C 752 300 686 392 572 452 Z" fill="url(#horn)"/>
  </g>

  <!-- Bright angled eyes (cool, slightly menacing) -->
  <g fill="#eafff0" filter="url(#soft)">
    <path d="M398 470 L498 512 L490 556 L394 522 Z"/>
    <path d="M626 470 L526 512 L534 556 L630 522 Z"/>
  </g>

  <!-- Large glowing </> code sigil — the hero mark -->
  <g fill="none" stroke="url(#venom)" stroke-width="74" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <polyline points="426,560 290,694 426,828"/>
    <polyline points="598,560 734,694 598,828"/>
    <line x1="566" y1="540" x2="458" y2="848"/>
  </g>
</svg>
