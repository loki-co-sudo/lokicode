<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182b"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#1c2c52" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#1c2c52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded-square background -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#glow)"/>
  <rect x="65.5" y="65.5" width="893" height="893" rx="206.5" fill="none" stroke="#2b3a63" stroke-opacity="0.7" stroke-width="3"/>

  <!-- Code mark: < / >  in a cool cyan→indigo gradient with a soft glow -->
  <g fill="none" stroke="url(#accent)" stroke-width="62" stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)">
    <polyline points="438,372 318,512 438,652"/>
    <polyline points="586,372 706,512 586,652"/>
    <line x1="556" y1="356" x2="468" y2="668"/>
  </g>

  <!-- AI spark -->
  <g filter="url(#softglow)">
    <path d="M512 150 L532 196 L578 216 L532 236 L512 282 L492 236 L446 216 L492 196 Z" fill="#7dd3fc"/>
  </g>
</svg>
