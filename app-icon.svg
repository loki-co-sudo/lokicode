<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0b12"/>
      <stop offset="1" stop-color="#040305"/>
    </linearGradient>
    <radialGradient id="evilglow" cx="0.5" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#3a0d12" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#1a0610" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1a0610" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="venom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6ff66"/>
      <stop offset="0.5" stop-color="#39e25a"/>
      <stop offset="1" stop-color="#0f9b35"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2030"/>
      <stop offset="1" stop-color="#0a0810"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded-square base with a sinister red ambient glow -->
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#evilglow)"/>
  <rect x="65.5" y="65.5" width="893" height="893" rx="214.5" fill="none" stroke="#34121b" stroke-opacity="0.9" stroke-width="3"/>

  <!-- Trickster horns sweeping up and outward -->
  <g stroke="#5a1f29" stroke-width="6" stroke-linejoin="round">
    <path d="M452 452 C 392 372 326 300 250 250 C 286 332 330 410 432 470 Z" fill="url(#horn)"/>
    <path d="M572 452 C 632 372 698 300 774 250 C 738 332 694 410 592 470 Z" fill="url(#horn)"/>
  </g>

  <!-- Menacing slit eyes (angled inward like a glare) -->
  <g fill="#ff2b3d" filter="url(#glow)">
    <path d="M404 470 L500 510 L492 556 L400 520 Z"/>
    <path d="M620 470 L524 510 L532 556 L624 520 Z"/>
  </g>

  <!-- Code sigil </> — the venom-green hero mark with a glow -->
  <g fill="none" stroke="url(#venom)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <polyline points="436,556 330,672 436,788"/>
    <polyline points="588,556 694,672 588,788"/>
    <line x1="556" y1="540" x2="468" y2="804"/>
  </g>
</svg>
